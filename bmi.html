<!DOCTYPE html>
<html lang="en">
<head>
    <title>Document</title>
    <style>
       body {
    background: hsl(301, 56%, 81%);
   
}

.container {
    width: 350px;
    margin: 50px auto;
    background: #fff;
    padding: 25px;
    border-radius: 10px;

}

h2 {
    text-align: center;
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border: 1px solid #e0d4d4;
    border-radius: 5px;
}

button {
    width: 100%;
    padding: 10px;
    background: #007bff;
    color: white;
    border-radius: 5px;
  
}

button:hover {
    background: #0056b3;
}

h3 {
    text-align: center;
    margin-top: 15px;
    font-size: 18px;
}


    </style>
</head>
<body>

<div class="container">
    <h2>BMI Calculator</h2>
     
    <label>Weight (kg):</label>
    <input type="number" id="weight" placeholder="Enter weight">

    <label>Height (cm):</label>
    <input type="number" id="height" placeholder="Enter height">


    <label>BMI:</label>
    <input type="text" id="result" placeholder="result">
   
    <h3 id="status"></h3>

    <button onclick="calculate()" id="btn">Calculate</button>
    
  
</div>


<script>
function calculate() {
    let height = document.getElementById('height').value;
    let weight = document.getElementById('weight').value;
    let bmi = (weight/height*height).toFixed(2);
      let results=bmi.value;
      document.getElementById("result").innerHTML=results;
     
    let condition = "";

    if (bmi < 18.5) {
        condition = "Underweight";
    } 
    else if (bmi >= 18.5 && bmi <= 24.9) {
        condition = "Normal Weight";
    }
    else if (bmi >= 25 && bmi <= 29.9) {
        condition = "Overweight";
    }
    else if (bmi >= 30 && bmi <= 34.9) {
        condition = "Obesity Class 1";
    }
    else if (bmi >= 35 && bmi <= 39.9) {
        condition = "Obesity Class 2";
    }
    else {
        condition = "Extreme Obesity (Class 3)";
    }

    document.getElementById("status").innerHTML= "STATUS : " + condition;
   

    
}

</script>
</body>
</html>
